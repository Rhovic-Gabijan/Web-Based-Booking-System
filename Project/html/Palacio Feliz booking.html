<!DOCTYPE html>
<html>
    <head>
        <title>Palacio Feliz Booking</title>
        <meta name="viewport" content="width=device-width, initial scale=1.0">
        <link rel="icon" href="../Assets/Palacio Feliz.jpg">
        <link rel="stylesheet" href="../css/Palacio Feliz booking.css">
    
    </head>
    <body>
        <nav><!--Navigation Bar-->
            <div class="logo-container">
                <img class="logo" src="../Assets/Palacio (1).png" width="75px">
            </div>

            <div class="Services">
                <a class="link" href="../html/Palacio Feliz main.html">Home</a>
                <a class="link" href="#gallery-container">Gallery</a>
                <a class="link" href="#">Room</a>
                <a class="link" href="#">Amenities</a>
                <a class="btn-link" href="Palacio Feliz booking.html">Book now</a>
            </div>
        </nav>
        <div class="content-container">
            <video class="teaser" autoplay muted loop>
                <source src="../Assets/Teaser (1).mp4">
            </video>
        </div>

        <!--BOOKING PANEL-->
       <div id="booking">
            <h1 class="sch_avb">1. SCHEDULE & AVAILABILITY</h1>
            <hr>
            <div class="bookingform">
                <label class="checkdate" id="checkin"><b>Check-in-Date</b></label>
                <label class="checkdate" id="checkout"><b>Check-out-Date</b></label>
                <label class="adults" id="matanda"><b>Adults</b></label>
                <label class="children" id="bata"><b>Children (0-17)</b></label>
                <label class="numrooms" id="norooms"><b>Number of Rooms</b></label>
            </div>

            <div class="bookinginput">
                <input class="bookingin" for="checkin" type="date">
                <input class="bookingin" for="checkout" type="date">
                <input class="bookingin" for="matanda" type="number" placeholder="No. of Adults">
                <input class="bookingin" for="bata" type="number" placeholder="No. of Children">
                <input class="bookingin" for="norooms" type="number" placeholder="No. of Rooms">

            </div><br><br>

            <!--Accomodation Type-->
            <div>
                <label class="Accom-type" for="accommodation"><b>Accommodation Type</b></label>
            </div>
            <div>
                <select class="Accomchoices">
                    <option for="accommodation" value="gathering">Gathering</option>
                    <option for="accommodation" value="reunion">Reunion</option>
                    <option for="accommodation" value="celebration">Celebration</option>
                    <option for="accommodation" value="team_building">Team Building</option>
                    <option for="accommodation" value="others">Others</option>
                </select>
            </div>
            <hr>

            <!--PRICE RANGE & AMENITIES-->
            <div class="prcamn-panel">
                <label class="price"><b>Price Range (₱)</b></label>
                <label class="inclusion"><b>Amenities</b></label>
            </div>

            <div class="priceinput">
                <input class="pricenumber" id="finalprice" type="number" placeholder="(₱)">
                <input class="pricerange" for="finalprice" type="range">

            </div>

            <div class="amenities">
                <input type="checkbox" checked>
                <label>Free Wifi</label><br>
                
                <input type="checkbox">
                <label>Pet Friendly</label>
            </div>
        </div>

        <!--GUEST DETALS-->
        <div id="guestdetails">
            <h1 class="detalye">2. GUEST DETAILS</h1>
            <hr>

            <div class="guestform">
                <label class="fname" id="firstn"><b>First Name</b></label>
                <label class="lname" id="lastn"><b>Last Name</b></label>
                <label class="email" id="emailadd"><b>Email Address</b></label>
                <label class="cpnumber" id="cpno"><b>Phone Number</b></label>
                <label class="city" id="lugar"><b>City</b></label>
            </div>

            <div class="bookinginput">
                <input class="bookingin" for="firstn" type="text" placeholder="First Name">
                <input class="bookingin" for="lastn" type="text" placeholder="Last Name">
                <input class="bookingin" for="emailadd" type="email" placeholder="Email">
                <input class="bookingin" for="cpno" type="tel" placeholder="Phone Number">
                <input class="bookingin" for="lugar" type="text" placeholder="City">

            </div><br><br>

            <!--SPECIAL REQUEST-->
            <div>
                <p class="specialrequest" id="srequest"><b>Special Request</b></p>
                <textarea class="requestsulat" rows="4" cols="40" placeholder="E.g., High floor, feather allergy,..."></textarea>
            </div>
           
            <div class="nosmoking">
                <input type="checkbox">
                <label>Non-Smoking Room</label><br>
            </div>
        </div>

        <!--PAYMENT & CONFIRMATION-->
        <div id="paymentconfirm">
            <h1 class="payconfirmhead">3. PAYMENT & CONFIRMATION</h1>
            <hr>

            <!--Payment Method-->
            <div class="payment-method">
                <div class="method">
                    <input id="paymaya" type="radio" name="bayadmethod">
                    <label for="paymaya">PayMaya</label>
                </div>

                <div class="method">
                    <input id="gcash" type="radio" name="bayadmethod">
                    <label for="gcash">Gcash</label>
                </div>

                <div class="method">
                    <input id="cash" type="radio" name="bayadmethod">
                    <label for="cash">Cash</label>
                </div>
            </div>

            <!--Cardholder name-->
            <div>
                <p class="holdername"><b>Cardholder Name</b></p>
                <input class="cardholdername" type="text">
            </div>

            <div>
                <p class="cardnumber"><b>Card Number</b></p>
                <input class="cardnum" type="text" placeholder="00000000000">
            </div>

            <!--Expiration-->
            <div>
                <label class="expiry" id="xp"><b>Expiry</b></label><br>
                <input class="ex-araw" for="xp" type="month">
            </div>

            <hr>

            <!--Terms and Condition-->
            <div>
                <input class="termscondition" type="checkbox">
                <label>I accept the <b>Terms & Conditions</b></label>
            </div>

            <!--Cancellation Policy-->
            <div>
                <input class="cancelpolicy" type="checkbox">
                <label>I accept the <b>Cancellation Policy</b></label>
            </div>

            <div>
                <button class="ipasa"><b>Confirm Booking</b></button>
            </div>

        </div>

    </body>
    <script src="../js/Palacio booking.js"></script>
</html>
